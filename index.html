<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VocabMaster</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css?v=4.2.2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#1a1a2e">
</head>
<body>
  <div class="app-container">
    <section id="menu-container" class="menu-container">
      <div class="menu-header">
        <h1 class="app-title">VocabMaster</h1>
        <p class="app-subtitle">Vocabulary practice</p>
        <p class="app-version" id="app-version">Version</p>
      </div>

      <div class="menu-grid">
        <button class="menu-card" data-bank="toeic">
          <div class="menu-icon">B</div>
          <h2 id="bank-title-toeic">TOEIC</h2>
          <p id="bank-desc-toeic">Business and workplace vocabulary practice.</p>
        </button>
        <button class="menu-card" data-bank="school7000">
          <div class="menu-icon">A</div>
          <h2 id="bank-title-school7000">School 7000</h2>
          <p id="bank-desc-school7000">Academic and reading vocabulary practice.</p>
        </button>
        <button class="menu-card" data-bank="dailyLife">
          <div class="menu-icon">L</div>
          <h2 id="bank-title-dailyLife">Daily Life</h2>
          <p id="bank-desc-dailyLife">Everyday words for home, travel, and routines.</p>
        </button>
      </div>

      <section class="stats-panel glass-card" aria-labelledby="stats-title">
        <div class="stats-panel-header">
          <div>
            <p class="stats-kicker">Learning Snapshot</p>
            <h2 id="stats-title">Progress</h2>
          </div>
          <button id="btn-reset-progress" class="text-btn" type="button">Reset</button>
        </div>
        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-label">Studied</span>
            <strong class="stat-value" id="stat-studied">0</strong>
          </div>
          <div class="stat-item">
            <span class="stat-label">Accuracy</span>
            <strong class="stat-value" id="stat-accuracy">0%</strong>
          </div>
          <div class="stat-item">
            <span class="stat-label">Mastered</span>
            <strong class="stat-value" id="stat-mastered">0</strong>
          </div>
          <div class="stat-item">
            <span class="stat-label">Review</span>
            <strong class="stat-value" id="stat-review">0</strong>
          </div>
        </div>
        <p class="stats-footnote" id="stats-footnote">Your focus words will appear here after you start practicing.</p>
      </section>
    </section>

    <header class="header hidden" id="quiz-header">
      <button id="btn-back" class="text-btn">Back</button>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-text">Left: <span id="remaining-count">10</span></div>
    </header>

    <main class="quiz-container hidden" id="quiz-container">
      <div class="glass-card">
        <div class="word-section">
          <h1 id="target-word" class="word">...</h1>
          <p id="phonetic" class="phonetic">...</p>
          <button id="btn-speak" class="icon-btn" aria-label="Pronounce">A</button>
        </div>
        <div class="options-grid" id="options-container"></div>
      </div>
    </main>

    <div id="feedback-overlay" class="overlay hidden">
      <div class="feedback-content" id="feedback-text">Correct!</div>
    </div>

    <div id="level-complete-overlay" class="overlay hidden">
      <div class="level-complete-content glass-card" style="text-align: center; gap: 15px; padding: 40px; margin: 20px;">
        <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Complete</h2>
        <p id="level-summary-text" style="color: var(--text-secondary); margin-bottom: 10px;">Session summary</p>
        <div id="session-summary" class="session-summary"></div>
        <button id="btn-level-back" class="option-btn" style="text-align: center; font-weight: bold; background: var(--accent-color);">Back Home</button>
      </div>
    </div>
  </div>

  <script src="bank-config.js?v=4.2.2"></script>
  <script src="mean-zh.js?v=4.2.2"></script>
  <script src="db.js?v=4.2.2"></script>
  <script src="app.js?v=4.2.2"></script>
  <script>
    if ("serviceWorker" in navigator) {
      let isRefreshing = false;

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (isRefreshing) return;
        isRefreshing = true;
        window.location.reload();
      });

      window.addEventListener("load", async () => {
        const registration = await navigator.serviceWorker.register("sw.js?v=4.2.2");
        await registration.update();

        if (registration.waiting) {
          registration.waiting.postMessage({ type: "SKIP_WAITING" });
        }

        registration.addEventListener("updatefound", () => {
          const newWorker = registration.installing;
          if (!newWorker) return;

          newWorker.addEventListener("statechange", () => {
            if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
              newWorker.postMessage({ type: "SKIP_WAITING" });
            }
          });
        });
      });
    }
  </script>
</body>
</html>
